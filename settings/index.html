<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
    <style>
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .muted {
        color: #666;
        margin-bottom: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 8px;
        border-bottom: 1px solid #ddd;
        vertical-align: middle;
      }

      .empty {
        padding: 12px;
        border: 1px dashed #ccc;
      }

      .section-title {
        margin: 16px 0 8px;
      }
    </style>
  </head>
  <body>
    <header class="homey-header">
      <h1 class="homey-title">Virtual Sun</h1>
      <p class="homey-subtitle">See active ramps and configured sun rules.</p>
    </header>

    <div class="toolbar">
      <button id="refresh" class="homey-button-secondary">Refresh</button>
      <button id="stopAll" class="homey-button-danger">Stop all</button>
    </div>

    <p id="status" class="muted">Loading...</p>
  <h2 class="section-title">Active ramps</h2>
    <div id="content"></div>
  <h2 class="section-title">Sun value configurations</h2>
  <div id="sunConfigs"></div>

    <script type="text/javascript">
      function fmtSeconds(totalSeconds) {
        var s = Math.max(0, Number(totalSeconds) || 0);
        var mins = Math.floor(s / 60);
        var secs = s % 60;
        return mins + "m " + String(secs).padStart(2, "0") + "s";
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function onHomeyReady(Homey) {
        var contentEl = document.getElementById("content");
        var sunConfigsEl = document.getElementById("sunConfigs");
        var statusEl = document.getElementById("status");
        var refreshBtn = document.getElementById("refresh");
        var stopAllBtn = document.getElementById("stopAll");
        var refreshIntervalId = null;
        var isLoading = false;

        function setStatus(text) {
          statusEl.textContent = text;
        }

        function stopRamp(name) {
          Homey.api("DELETE", "/ramps/" + encodeURIComponent(name), null, function (err, result) {
            if (err) return Homey.alert(err.message || String(err));
            if (!result || !result.stopped) {
              return Homey.alert("Ramp was not active.");
            }
            loadAll();
          });
        }

        function renderRamps(ramps) {
          if (!Array.isArray(ramps) || ramps.length === 0) {
            contentEl.innerHTML = '<div class="empty">No active ramps.</div>';
            return;
          }

          var rows = ramps
            .map(function (ramp) {
              var name = escapeHtml(ramp.name);
              var direction = escapeHtml(ramp.direction);
              var step = Number(ramp.step).toFixed(1);
              var value = Number(ramp.value).toFixed(1);
              var elapsed = fmtSeconds(ramp.elapsedSeconds);
              var remaining = fmtSeconds(ramp.remainingSeconds);

              return (
                "<tr>" +
                "<td>" + name + "</td>" +
                "<td>" + direction + "</td>" +
                "<td>" + value + "%</td>" +
                "<td>" + step + " pp</td>" +
                "<td>" + elapsed + "</td>" +
                "<td>" + remaining + "</td>" +
                "<td><button class=\"homey-button-danger\" data-stop=\"" + name + "\">Stop</button></td>" +
                "</tr>"
              );
            })
            .join("");

          contentEl.innerHTML =
            "<table>" +
            "<thead><tr><th>Name</th><th>Direction</th><th>Value</th><th>Step</th><th>Elapsed</th><th>Remaining</th><th></th></tr></thead>" +
            "<tbody>" + rows + "</tbody>" +
            "</table>";

          contentEl.querySelectorAll("button[data-stop]").forEach(function (button) {
            button.addEventListener("click", function () {
              stopRamp(button.getAttribute("data-stop"));
            });
          });
        }

        function renderSunConfigurations(configurations) {
          if (!Array.isArray(configurations) || configurations.length === 0) {
            sunConfigsEl.innerHTML = '<div class="empty">No configured sun value rules.</div>';
            return;
          }

          var rows = configurations
            .map(function (config) {
              var startTime = escapeHtml(config.startTime);
              var endTime = escapeHtml(config.endTime);
              var direction = escapeHtml(config.direction);
              var step = Number(config.step).toFixed(1);
              var activeNow = config.activeNow ? "Yes" : "No";
              var currentValue =
                config.currentValue === null || config.currentValue === undefined
                  ? "-"
                  : Number(config.currentValue).toFixed(1) + "%";
              var lastTriggeredValue =
                config.lastTriggeredValue === null || config.lastTriggeredValue === undefined
                  ? "-"
                  : Number(config.lastTriggeredValue).toFixed(1) + "%";
              var nextTrigger =
                config.nextTriggerSeconds === null || config.nextTriggerSeconds === undefined
                  ? "-"
                  : Number(config.nextTriggerSeconds) <= 0
                    ? "now"
                    : Math.round(Number(config.nextTriggerSeconds)) + "s";

              return (
                "<tr>" +
                "<td>" + startTime + "</td>" +
                "<td>" + endTime + "</td>" +
                "<td>" + direction + "</td>" +
                "<td>" + step + " pp</td>" +
                "<td>" + activeNow + "</td>" +
                "<td>" + currentValue + "</td>" +
                "<td>" + lastTriggeredValue + "</td>" +
                "<td>" + nextTrigger + "</td>" +
                "</tr>"
              );
            })
            .join("");

          sunConfigsEl.innerHTML =
            "<table>" +
            "<thead><tr><th>Start</th><th>End</th><th>Direction</th><th>Step</th><th>Active now</th><th>Current value</th><th>Last triggered</th><th>Next trigger</th></tr></thead>" +
            "<tbody>" + rows + "</tbody>" +
            "</table>";
        }

        function loadAll() {
          if (isLoading) return;
          isLoading = true;
          setStatus("Loading...");
          var pending = 2;

          function doneOne() {
            pending -= 1;
            if (pending === 0) {
              isLoading = false;
            }
          }

          Homey.api("GET", "/ramps", null, function (err, result) {
            if (err) {
              isLoading = false;
              return Homey.alert(err.message || String(err));
            }

            var ramps = (result && result.ramps) || [];
            renderRamps(ramps);
            setStatus("Active ramps: " + ramps.length);
            doneOne();
          });

          Homey.api("GET", "/sun-value-configurations", null, function (err, result) {
            if (err) {
              isLoading = false;
              return Homey.alert(err.message || String(err));
            }

            var configurations = (result && result.configurations) || [];
            renderSunConfigurations(configurations);
            doneOne();
          });
        }

        refreshBtn.addEventListener("click", loadAll);

        stopAllBtn.addEventListener("click", function () {
          Homey.api("DELETE", "/ramps-stop-all", null, function (err, result) {
            if (err) return Homey.alert(err.message || String(err));
            var count = (result && result.stoppedCount) || 0;
            setStatus("Stopped ramps: " + count);
            loadAll();
          });
        });

        loadAll();
        refreshIntervalId = setInterval(loadAll, 5000);
        window.addEventListener("beforeunload", function () {
          if (refreshIntervalId !== null) {
            clearInterval(refreshIntervalId);
            refreshIntervalId = null;
          }
        });
        Homey.ready();
      }
    </script>
  </body>
</html>
